name: E2E

# 端對端(Playwright)較重:起 backend + 三前端真服務再跑。只在相關原始碼變更時觸發,
# 另開 workflow 與快速 CI 分離,不拖慢 unit/integration 的回饋。
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # backend venv:e2e 的 webServer 直接以 .venv 內 python 起 uvicorn(走 e2e.db SQLite)。
      - name: Setup backend venv
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .

      # 三個前端 app 都要相依:remote(auth/chat)build+preview、shell dev。
      - name: Install frontend deps
        run: |
          for app in auth chat shell; do
            (cd "frontend/$app" && npm ci)
          done

      - name: Install e2e deps + browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test

      # 失敗時保留報告 / trace / video,方便事後排查(成功則不留以省空間)。
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
