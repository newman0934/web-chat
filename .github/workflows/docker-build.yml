name: Docker build

# 只在 Docker / 前後端原始碼相關變更時跑(純文件變更不必等映像建置)。
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: build all images (buildx bake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # 用 buildx bake 從 compose 建 backend 與三個前端映像(db 是 image: 不需建)。
      # 以 GitHub Actions cache 做 layer 快取:每個 target 各自 scope,
      # 相依/原始碼沒變的 layer(npm ci、pip install、vite build)跨 run 重用。
      - name: Build all images (bake + GHA cache)
        uses: docker/bake-action@v5
        with:
          files: docker-compose.yml
          set: |
            backend.cache-from=type=gha,scope=backend
            backend.cache-to=type=gha,scope=backend,mode=max
            frontend-auth.cache-from=type=gha,scope=frontend-auth
            frontend-auth.cache-to=type=gha,scope=frontend-auth,mode=max
            frontend-chat.cache-from=type=gha,scope=frontend-chat
            frontend-chat.cache-to=type=gha,scope=frontend-chat,mode=max
            frontend-shell.cache-from=type=gha,scope=frontend-shell
            frontend-shell.cache-to=type=gha,scope=frontend-shell,mode=max
