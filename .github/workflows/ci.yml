name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同分支新 push 取消前一輪未跑完的(省 runner 時間)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        # 測試走檔案型 SQLite,不需外部 Postgres/Docker。
        run: python -m pytest -q

  frontend:
    name: ${{ matrix.app }} typecheck + vitest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [shell, auth, chat]
    defaults:
      run:
        working-directory: frontend/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
